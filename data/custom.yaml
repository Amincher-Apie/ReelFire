# YOLO 自定义数据集配置
# 基于 ReelFire FPS 游戏素材训练

# 数据集根目录（prepare_dataset.py 整理后的目录）
path: D:/_Keshe/ReelFire/data/custom_dataset  # 数据集根目录（绝对路径）
train: images/train                   # 训练集图片目录（相对于 path）
val: images/val                       # 验证集图片目录（相对于 path）

# 类别数量
nc: 4

# 类别名称（按 class_id 顺序排列，必须与标注文件中的 class_id 对应）
# ⚠️ 顺序必须和 LabelNazuki 里创建的顺序一致
names:
  0: character_ct     # CT 角色
  1: character_t      # T 角色
  2: weapon_rifle     # 步枪
  3: weapon_pistol    # 手枪
