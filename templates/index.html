<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day08 智能视频精彩片段提取</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">DAY 08 · PHASE 1</p>
      <h1>智能视频精彩片段提取</h1>
      <p>第一阶段后端联调台：上传、任务状态、分析占位与安全删除。</p>
    </header>

    <section class="panel">
      <h2>创建任务</h2>
      <form id="upload-form">
        <label>项目名称 <input name="project_name" value="游戏录屏精彩片段提取"></label>
        <label>视频文件 <input name="file" type="file" accept=".mp4,.avi,.mov,.mkv" required></label>
        <button type="submit">上传并创建任务</button>
      </form>
      <p id="message" role="status"></p>
    </section>

    <section class="panel">
      <div class="section-heading">
        <h2>历史任务</h2>
        <button id="refresh" type="button" class="secondary">刷新</button>
      </div>
      <div id="jobs" class="jobs"><p class="empty">正在读取任务…</p></div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
