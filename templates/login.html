<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelFire - 登录</title>
<link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">RF</div>
      Reel<span>Fire</span>
    </div>
    <p class="auth-subtitle">智能数字媒体内容理解系统</p>

    <form id="login-form" class="auth-form active" onsubmit="return handleLogin(event)">
      <h2>登录</h2>
      <div class="input-group">
        <label>用户名 <span class="required">*</span></label>
        <input type="text" id="login-username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="input-group">
        <label>密码 <span class="required">*</span></label>
        <input type="password" id="login-password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <div id="login-error" class="auth-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">登录</button>
      <p class="auth-switch">还没有账号？<a href="javascript:showRegister()">立即注册</a></p>
    </form>

    <form id="register-form" class="auth-form" onsubmit="return handleRegister(event)">
      <h2>注册</h2>
      <div class="input-group">
        <label>用户名 <span class="required">*</span></label>
        <input type="text" id="register-username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="input-group">
        <label>密码 <span class="required">*</span></label>
        <input type="password" id="register-password" placeholder="请设置密码（至少6位）" required minlength="6" autocomplete="new-password">
      </div>
      <div class="input-group">
        <label>确认密码 <span class="required">*</span></label>
        <input type="password" id="register-confirm" placeholder="请再次输入密码" required autocomplete="new-password">
      </div>
      <div id="register-error" class="auth-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full">注册</button>
      <p class="auth-switch">已有账号？<a href="javascript:showLogin()">返回登录</a></p>
    </form>
  </div>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
